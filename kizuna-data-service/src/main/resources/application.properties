spring.application.name=kizuna-data-service
server.servlet.context-path=/data

kizuna.integration.enabled=true
kizuna.integration.api-key-header=X-API-Key
kizuna.integration.bootstrap-key=${KIZUNA_INTEGRATION_BOOTSTRAP_KEY:}
kizuna.integration.max-page-size=200
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always