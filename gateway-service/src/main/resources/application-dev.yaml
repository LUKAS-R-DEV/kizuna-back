spring:
  cloud:
    gateway:
      routes:
        - id: keycloak-realms
          uri: http://localhost:8081
          predicates:
            - Path=/realms/**
        - id: keycloak-resources
          uri: http://localhost:8081
          predicates:
            - Path=/resources/**
        - id: kizuna-core-service
          uri: http://localhost:8082
          predicates:
            - Path=/core/**
          filters:
            - StripPrefix=0
        - id: ai-service
          uri: http://localhost:8090
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=0
        - id: iam-service
          uri: http://localhost:8083
          predicates:
            - Path=/iam/**
          filters:
            - StripPrefix=1
        - id: data-service
          uri: http://localhost:8085
          predicates:
            - Path=/data/**
          filters:
            - StripPrefix=0
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1
        - id: audit-service
          uri: http://localhost:8087
          predicates:
            - Path=/audit/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
