server:
  port: 8087

spring:
  application:
    name: audit-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/kizuna-audit

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest


management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always