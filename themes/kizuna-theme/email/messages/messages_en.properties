orgInviteBodyHtml=<p style="margin:0 0 16px;color:#e2e8f0;">You are invited to join organization <strong style="color:#fff;">{3}</strong> on KIZUNA.</p><table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-radius:6px;background-color:#dc2626;"><a href="{0}" style="display:inline-block;padding:14px 28px;font-size:13px;font-weight:800;color:#ffffff;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Accept invitation</a></td></tr></table><p style="margin:20px 0 0;font-size:12px;color:#64748b;">Expires in {4}.</p>

