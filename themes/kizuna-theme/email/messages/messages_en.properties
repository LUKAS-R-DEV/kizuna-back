# HTML bodies (inserted inside KIZUNA email layout)
emailVerificationBodyHtml=<p style="margin:0 0 16px;color:#e2e8f0;">A <strong style="color:#fff;">KIZUNA</strong> account was created with this email. Confirm it to continue.</p><p style="margin:0 0 20px;color:#94a3b8;font-size:13px;">Realm: <strong style="color:#fca5a5;">{2}</strong> · Link expires in <strong>{3}</strong></p><table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-radius:6px;background-color:#dc2626;"><a href="{0}" style="display:inline-block;padding:14px 28px;font-size:13px;font-weight:800;color:#ffffff;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Verify email</a></td></tr></table><p style="margin:20px 0 0;font-size:12px;color:#64748b;">If you did not create this account, ignore this message.</p>

passwordResetBodyHtml=<p style="margin:0 0 16px;color:#e2e8f0;">A password reset was requested for your <strong style="color:#fff;">KIZUNA</strong> account.</p><p style="margin:0 0 20px;color:#94a3b8;font-size:13px;">Realm: <strong style="color:#fca5a5;">{2}</strong> · Link expires in <strong>{3}</strong></p><table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-radius:6px;background-color:#dc2626;"><a href="{0}" style="display:inline-block;padding:14px 28px;font-size:13px;font-weight:800;color:#ffffff;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Reset password</a></td></tr></table><p style="margin:20px 0 0;font-size:12px;color:#64748b;">If you did not request this, ignore this message. Your password will not change.</p>

executeActionsBodyHtml=<p style="margin:0 0 16px;color:#e2e8f0;">Your administrator requires the following on your <strong style="color:#fff;">KIZUNA</strong> account:</p><p style="margin:0 0 20px;padding:12px 14px;background-color:#12121a;border-left:3px solid #dc2626;color:#fca5a5;font-size:13px;font-weight:700;">{3}</p><p style="margin:0 0 20px;color:#94a3b8;font-size:13px;">Realm: <strong style="color:#fca5a5;">{2}</strong> · Link expires in <strong>{4}</strong></p><table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-radius:6px;background-color:#dc2626;"><a href="{0}" style="display:inline-block;padding:14px 28px;font-size:13px;font-weight:800;color:#ffffff;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Continue setup</a></td></tr></table><p style="margin:20px 0 0;font-size:12px;color:#64748b;">If this was unexpected, contact your system administrator.</p>

emailUpdateConfirmationBodyHtml=<p style="margin:0 0 16px;color:#e2e8f0;">Confirm the new email address for your <strong style="color:#fff;">KIZUNA</strong> account.</p><p style="margin:0 0 20px;color:#94a3b8;font-size:13px;">New address: <strong style="color:#fff;">{1}</strong> · Expires in <strong>{3}</strong></p><table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-radius:6px;background-color:#dc2626;"><a href="{0}" style="display:inline-block;padding:14px 28px;font-size:13px;font-weight:800;color:#ffffff;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Confirm email</a></td></tr></table>

emailTestBodyHtml=<p style="margin:0;color:#e2e8f0;">SMTP test from <strong style="color:#fff;">KIZUNA</strong> — delivery successful.</p>

identityProviderLinkBodyHtml=<p style="margin:0 0 16px;color:#e2e8f0;">Link your <strong style="color:#fff;">{1}</strong> account with <strong>{0}</strong> (user {2}).</p><table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="border-radius:6px;background-color:#dc2626;"><a href="{3}" style="display:inline-block;padding:14px 28px;font-size:13px;font-weight:800;color:#ffffff;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;">Link accounts</a></td></tr></table><p style="margin:20px 0 0;font-size:12px;color:#64748b;">Expires in {5}. Ignore if you did not start this.</p>

eventLoginErrorBodyHtml=<p style="margin:0 0 12px;color:#e2e8f0;"><strong style="color:#f87171;">Failed login</strong> on your KIZUNA account.</p><p style="margin:0;color:#94a3b8;font-size:13px;">Time: {0}<br/>IP: {1}</p><p style="margin:16px 0 0;font-size:12px;color:#64748b;">If this was not you, contact an administrator.</p>

eventUpdatePasswordBodyHtml=<p style="margin:0 0 12px;color:#e2e8f0;">Your KIZUNA password was changed.</p><p style="margin:0;color:#94a3b8;font-size:13px;">Time: {0}<br/>IP: {1}</p>

eventUpdateTotpBodyHtml=<p style="margin:0 0 12px;color:#e2e8f0;">OTP settings were updated on your KIZUNA account.</p><p style="margin:0;color:#94a3b8;font-size:13px;">Time: {0}<br/>IP: {1}</p>

eventRemoveTotpBodyHtml=<p style="margin:0 0 12px;color:#e2e8f0;">OTP was removed from your KIZUNA account.</p><p style="margin:0;color:#94a3b8;font-size:13px;">Time: {0}<br/>IP: {1}</p>

eventUpdateCredentialBodyHtml=<p style="margin:0 0 12px;color:#e2e8f0;">Credential <strong>{0}</strong> was updated.</p><p style="margin:0;color:#94a3b8;font-size:13px;">Time: {1}<br/>IP: {2}</p>

