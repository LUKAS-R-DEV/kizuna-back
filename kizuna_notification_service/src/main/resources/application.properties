spring.application.name=kizuna_notification_service
server.servlet.context-path=/ntf
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://mongo:27017/kizuna-notification}
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://mongo:27017/kizuna-notification}
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
management.endpoints.web.exposure.include=health
management.health.mail.enabled=false

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:}
spring.mail.properties.mail.smtp.ssl.checkserveridentity=${SMTP_SSL_CHECK_SERVER_IDENTITY:true}

kizuna.health-alert.mail.enabled=${KIZUNA_HEALTH_ALERT_ENABLED:false}
kizuna.health-alert.mail.from=${KIZUNA_HEALTH_ALERT_FROM:kizuna-alerts@localhost}
kizuna.health-alert.mail.recipients-csv=${KIZUNA_HEALTH_ALERT_RECIPIENTS:}
